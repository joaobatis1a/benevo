<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Benevo - Cadastro Doador</title>

    <link rel="stylesheet" href="assets/css/styles.css" />
    <link rel="stylesheet" href="assets/css/forms.css" />
    
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Shrikhand&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>
    <header class="header">
        <h1 class="logo">Benevo</h1>
    </header>

    <main>
        <div class="titulo-container">
            <a href="demo.html" class="btn-voltar"><</a>
            <h2 class="titulo">Cadastro Doador</h2>
        </div>

        <div class="card-cadastro">
            <form id="form-cad-doador">
                
                <div class="form-group-cadastro full-width">
                    <label>Nome:</label>
                    <input type="text" id="nome" placeholder="Seu nome completo" required />
                </div>
                
                <div class="form-group-cadastro full-width">
                    <label>Email:</label>
                    <input type="email" id="email" placeholder="seu.email@exemplo.com" required />
                </div>
                
                <div class="form-row-cadastro">
                    <div class="form-group-cadastro">
                        <label>Senha:</label>
                        <div class="password-wrapper">
                            <input type="password" id="senha" required />
                            <i class="fas fa-eye toggle-password" id="toggleSenha"></i>
                        </div>
                    </div>
                    
                    <div class="form-group-cadastro">
                        <label>Confirmar Senha:</label>
                        <div class="password-wrapper">
                            <input type="password" id="confirmaSenha" required />
                            <i class="fas fa-eye toggle-password" id="toggleConfirmaSenha"></i>
                        </div>
                    </div>
                </div>

                <div class="form-group-cadastro full-width">
                    <ul class="password-rules">
                        <li id="rule-length">Mínimo de 6 caracteres</li>
                        <li id="rule-match">Senhas devem ser iguais</li>
                    </ul>
                </div>

                <div class="form-row-cadastro">
                    <div class="form-group-cadastro telefone-group">
                        <label>Telefone (Opcional)</label>
                        <input type="tel" id="telefone" placeholder="(99) 99999-9999" />
                    </div>
                    <div class="form-group-cadastro full-width">
                        <label>CPF:</label>
                        <input type="text" id="cpf" placeholder="000.000.000-00" required />
                    </div>
                </div>
                
                <button type="submit" class="btn-cadastrar">Cadastrar</button>

                <p class="ja-tem-conta">Já tem uma conta? <a href="login-doador.html">Faça login.</a></p>

            </form>
        </div>
    </main>

    <script type="module" src="assets/js/pages/cadastro-doador.js"></script>
  <script src="assets/js/demo-back-button.js"></script>
</body>
</html>
